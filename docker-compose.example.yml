services:
  postgres:
    image: ghcr.io/elbgoods/postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: eventbackend
      POSTGRES_USER: eventbackend
      # Optional: create additional databases (comma-separated)
      # POSTGRES_MULTIPLE_DATABASES: myapp,otherapp
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
